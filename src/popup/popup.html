<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulary Lookup</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-color: #ffffff;
        --text-color: #1f2937;
        --hint-color: #4b5563;
        --border-color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body.dark-mode {
        --bg-color: #1f2937;
        --text-color: #f3f4f6;
        --hint-color: #9ca3af;
        --border-color: #374151;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg-color);
        color: var(--text-color);
      }

      main {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hint {
        margin: 0;
        font-size: 13px;
        color: var(--hint-color);
      }

      .meta {
        margin: 0;
        font-size: 12px;
        color: var(--hint-color);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vocabulary Lookup</h1>

      <div class="row">
        <label for="auto-popup-toggle">Auto-popup</label>
        <input id="auto-popup-toggle" type="checkbox" />
      </div>

      <div class="row">
        <label for="dark-mode-toggle">Dark mode</label>
        <input id="dark-mode-toggle" type="checkbox" />
      </div>

      <hr style="border: none; border-top: 1px solid var(--border-color); margin: 4px 0;" />
      
      <p class="hint">
        <strong>Quick Search:</strong> <br/>
        <span style="font-family: monospace;">Ctrl+Shift+D</span> (hoặc <span style="font-family: monospace;">⌘+Shift+D</span>)
      </p>

      <p id="auto-popup-status" class="hint" aria-live="polite"></p>
      <!-- <p id="attribution" class="meta"></p>
      <p id="disclosure" class="meta"></p> -->
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
